<!DOCTYPE html>
<html>
<head>
  <title>Single Page Test</title>
  <style>
    .good { color: #000000; background: #ffffff; }
    .bad1 { color: #888888; background: #ffffff; }
    .bad2 { color: #ff6b6b; background: #ffe0e0; }
    .bad-dark { color: #333333; background: #222222; }
  </style>
</head>
<body>
  <div class="good">Good contrast text</div>
  <div class="bad1">Poor gray on white contrast</div>
  <div class="bad2">Poor red on pink contrast</div>
  <div class="bad-dark">Dark gray on dark bg</div>
</body>
</html>
